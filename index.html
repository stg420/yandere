<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>YandereSimulator</title>
    <script src="Build/UnityLoader.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #unityContainer { width: 100vw; height: 100vh; }
        #loading-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 48px; font-family: sans-serif; text-align: center; }
    </style>
    <script>
        let max = 0, done = 0;

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                const buffers = [];
                const fetchPart = (index) => {
                    if (index >= fileParts.length) {
                        const blob = new Blob(buffers);
                        resolve(URL.createObjectURL(blob));
                        return;
                    }
                    fetch(fileParts[index]).then(r => r.arrayBuffer()).then(b => {
                        buffers.push(b);
                        done++;
                        document.querySelector("#loading-text").textContent = "LOADING... (" + done + "/" + max + ")";
                        fetchPart(index + 1);
                    }).catch(reject);
                };
                fetchPart(0);
            });
        }

        window.onload = function() {
            // Using relative paths to avoid the 404s
            const parts = ["Build/YandereSim.data.unityweb.part1", "Build/YandereSim.data.unityweb.part2", "Build/YandereSim.data.unityweb.part3", "Build/YandereSim.data.unityweb.part4", "Build/YandereSim.data.unityweb.part5"];
            max = parts.length;

            mergeFiles(parts).then((dataUrl) => {
                const config = {
                    companyName: "YandereDev",
                    productName: "YandereSimulator",
                    dataUrl: dataUrl,
                    wasmCodeUrl: "Build/YandereSim.wasm.code.unityweb",
                    wasmFrameworkUrl: "Build/YandereSim.wasm.framework.unityweb",
                    TOTAL_MEMORY: 268435456,
                    graphicsAPI: ["WebGL 2.0", "WebGL 1.0"]
                };

                // Pass the config OBJECT directly, not a URL string
                UnityLoader.instantiate("unityContainer", config, {
                    onProgress: function(instance, progress) {
                        if (progress === 1) document.querySelector("#loading-text").remove();
                    }
                });
            });
        };
    </script>
</head>
<body>
    <div id="loading-text">LOADING...</div>
    <div id="unityContainer"></div>
</body>
</html>
