<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>YandereSimulator</title>
    <!-- Ensure this path is correct relative to the root -->
    <script src="/yandere/Build/UnityLoader.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #unityContainer { width: 100vw; height: 100vh; }
        #loading-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 48px; font-family: sans-serif; }
    </style>
    <script>
        let max = 0, done = 0;

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                const buffers = [];
                const fetchPart = (index) => {
                    if (index >= fileParts.length) {
                        const blob = new Blob(buffers);
                        resolve(URL.createObjectURL(blob));
                        return;
                    }
                    // Use leading slash to ensure paths are absolute from domain root
                    fetch(fileParts[index]).then(r => r.arrayBuffer()).then(b => {
                        buffers.push(b);
                        done++;
                        document.querySelector("#loading-text").textContent = "LOADING... (" + done + "/" + max + ")";
                        fetchPart(index + 1);
                    }).catch(reject);
                };
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            const parts = [];
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
            max += end;
            return parts;
        }

        window.onload = function() {
            // Absolute paths based on your console error structure
            const dataFiles = getParts("/yandere/Build/YandereSim.data.unityweb", 1, 5);
            
            mergeFiles(dataFiles).then((dataUrl) => {
                const config = {
                    companyName: "YandereDev",
                    productName: "YandereSimulator",
                    dataUrl: dataUrl,
                    wasmCodeUrl: "/yandere/Build/YandereSim.wasm.code.unityweb",
                    wasmFrameworkUrl: "/yandere/Build/YandereSim.wasm.framework.unityweb",
                    TOTAL_MEMORY: 268435456,
                    graphicsAPI: ["WebGL 2.0", "WebGL 1.0"]
                };

                UnityLoader.instantiate("unityContainer", config);
                document.querySelector("#loading-text").remove();
            });
        };
    </script>
</head>
<body>
    <div id="loading-text">LOADING...</div>
    <div id="unityContainer"></div>
</body>
</html>
